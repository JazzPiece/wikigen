<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}wikigen{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    a { color: #7dd3fc; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav { background: #1e2130; border-bottom: 1px solid #2d3348; padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 52px; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #f1f5f9; letter-spacing: -0.02em; }
    nav .brand span { color: #7dd3fc; }
    nav a { color: #94a3b8; font-size: 0.9rem; }
    nav a:hover { color: #e2e8f0; text-decoration: none; }
    nav a.active { color: #7dd3fc; }

    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; color: #f1f5f9; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; color: #cbd5e1; }

    .card { background: #1e2130; border: 1px solid #2d3348; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .stat { display: flex; flex-direction: column; gap: 0.25rem; }
    .stat .value { font-size: 2rem; font-weight: 700; color: #7dd3fc; }
    .stat .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }

    .meta { font-size: 0.85rem; color: #64748b; font-family: monospace; }

    form { display: flex; flex-direction: column; gap: 1rem; }
    label { font-size: 0.9rem; color: #94a3b8; display: flex; align-items: center; gap: 0.5rem; }
    input[type=text], textarea { background: #0f1117; border: 1px solid #2d3348; border-radius: 6px; padding: 0.6rem 0.8rem; color: #e2e8f0; font-size: 0.95rem; width: 100%; outline: none; }
    input[type=text]:focus, textarea:focus { border-color: #7dd3fc; }
    textarea { min-height: 80px; resize: vertical; font-family: inherit; }
    button[type=submit] { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 0.6rem 1.25rem; font-size: 0.95rem; cursor: pointer; align-self: flex-start; }
    button[type=submit]:hover { background: #1d4ed8; }

    .badge { display: inline-block; font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 500; }
    .badge-blue { background: #1e3a5f; color: #7dd3fc; }
    .badge-green { background: #14532d; color: #86efac; }
    .badge-yellow { background: #713f12; color: #fde68a; }

    .notice { padding: 0.75rem 1rem; border-radius: 6px; font-size: 0.9rem; background: #1e293b; border-left: 3px solid #7dd3fc; color: #94a3b8; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">wiki<span>gen</span></span>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
    <a href="/ingest" {% if request.url.path == "/ingest" %}class="active"{% endif %}>Ingest</a>
    <a href="/query" {% if request.url.path == "/query" %}class="active"{% endif %}>Query</a>
    <a href="/lint" {% if request.url.path == "/lint" %}class="active"{% endif %}>Lint</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
